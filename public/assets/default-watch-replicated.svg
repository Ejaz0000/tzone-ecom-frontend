<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect fill="#f3f4f6" width="400" height="400"/>
  
  <!-- Watch circle background -->
  <circle cx="200" cy="200" r="150" fill="#a0a0a0" opacity="0.2"/>
  
  <!-- Watch face -->
  <circle cx="200" cy="200" r="100" fill="#e8e8e8" stroke="#404040" stroke-width="3"/>
  
  <!-- Watch center dot -->
  <circle cx="200" cy="200" r="8" fill="#404040"/>
  
  <!-- Hour markers -->
  <g stroke="#404040" stroke-width="2">
    <line x1="200" y1="105" x2="200" y2="115"/>
    <line x1="270" y1="200" x2="280" y2="200"/>
    <line x1="200" y1="295" x2="200" y2="285"/>
    <line x1="130" y1="200" x2="120" y2="200"/>
  </g>
  
  <!-- Hour hand -->
  <line x1="200" y1="200" x2="200" y2="160" stroke="#404040" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="200" y1="200" x2="235" y2="165" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Watch band - Metal mesh -->
  <rect x="175" y="300" width="50" height="65" fill="#a8a8a8" rx="5" stroke="#808080" stroke-width="1"/>
  <line x1="180" y1="310" x2="220" y2="310" stroke="#808080" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="320" x2="220" y2="320" stroke="#808080" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="330" x2="220" y2="330" stroke="#808080" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="340" x2="220" y2="340" stroke="#808080" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="350" x2="220" y2="350" stroke="#808080" stroke-width="0.5" opacity="0.5"/>
  <line x1="180" y1="360" x2="220" y2="360" stroke="#808080" stroke-width="0.5" opacity="0.5"/>
  
  <!-- Shine effect -->
  <ellipse cx="160" cy="160" rx="35" ry="30" fill="white" opacity="0.4"/>
  
  <!-- Text -->
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="14" fill="#6b7280" text-anchor="middle" font-weight="bold">
    Replicated Watches
  </text>
</svg>