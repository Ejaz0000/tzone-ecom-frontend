<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background -->
  <rect fill="#f3f4f6" width="400" height="400"/>
  
  <!-- Watch circle background -->
  <circle cx="200" cy="200" r="150" fill="#d4a574" opacity="0.2"/>
  
  <!-- Watch face -->
  <circle cx="200" cy="200" r="100" fill="#f5e6d3" stroke="#8b7355" stroke-width="3"/>
  
  <!-- Watch center dot -->
  <circle cx="200" cy="200" r="8" fill="#8b7355"/>
  
  <!-- Hour markers -->
  <g stroke="#8b7355" stroke-width="2">
    <line x1="200" y1="105" x2="200" y2="115"/>
    <line x1="270" y1="200" x2="280" y2="200"/>
    <line x1="200" y1="295" x2="200" y2="285"/>
    <line x1="130" y1="200" x2="120" y2="200"/>
  </g>
  
  <!-- Hour hand -->
  <line x1="200" y1="200" x2="200" y2="160" stroke="#8b7355" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Minute hand -->
  <line x1="200" y1="200" x2="235" y2="165" stroke="#c17a3a" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Watch band -->
  <rect x="180" y="300" width="40" height="60" fill="#6b4423" rx="5"/>
  <rect x="170" y="360" width="60" height="15" fill="#6b4423" rx="3"/>
  
  <!-- Shine effect -->
  <ellipse cx="170" cy="170" rx="30" ry="25" fill="white" opacity="0.3"/>
  
  <!-- Text -->
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle" font-weight="bold">
    Authentic Watches
  </text>
</svg>